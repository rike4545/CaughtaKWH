name: Update Supercharger Price Data
on:
  workflow_dispatch:
    inputs:
      discovery_limit:
        description: Max station metadata records to discover
        required: false
        default: '5000'
      max_stations:
        description: Max station pricing pages to scrape this run
        required: false
        default: '300'
      scrape_states:
        description: Optional comma-separated states/provinces to refresh, for example CA,NV,ON
        required: false
        default: ''
      scrape_countries:
        description: Optional comma-separated countries to refresh
        required: false
        default: ''
      scrape_zip:
        description: Optional US ZIP code for a nearby-first refresh
        required: false
        default: ''
      scrape_lat:
        description: Optional latitude for a nearby-first refresh
        required: false
        default: ''
      scrape_lng:
        description: Optional longitude for a nearby-first refresh
        required: false
        default: ''
      scrape_radius_miles:
        description: Radius for ZIP/lat/lng nearby refresh
        required: false
        default: '150'
      needs_history:
        description: Only refresh stations that need usable price history
        required: false
        default: 'false'
  schedule:
    - cron: '43 9 * * 0'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: caughtakwh-data-writer
  cancel-in-progress: false
jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      DISCOVERY_LIMIT: ${{ github.event.inputs.discovery_limit || '5000' }}
      PRICE_SCRAPE_LIMIT: ${{ github.event.inputs.max_stations || '300' }}
      SCRAPE_DELAY_MS: 350
      SCRAPE_ROTATE_STATES: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
      SCRAPE_ROTATION_COUNT: 6
      SCRAPE_STATES: ${{ github.event.inputs.scrape_states || '' }}
      SCRAPE_COUNTRIES: ${{ github.event.inputs.scrape_countries || '' }}
      SCRAPE_ZIP: ${{ github.event.inputs.scrape_zip || '' }}
      SCRAPE_LAT: ${{ github.event.inputs.scrape_lat || '' }}
      SCRAPE_LNG: ${{ github.event.inputs.scrape_lng || '' }}
      SCRAPE_RADIUS_MILES: ${{ github.event.inputs.scrape_radius_miles || '150' }}
      SCRAPE_NEEDS_HISTORY: ${{ github.event.inputs.needs_history || (github.event_name == 'schedule' && 'true' || 'false') }}
      AKAMAI_CIRCUIT_BREAKER: 3
      BLOCK_COOLDOWN_BASE_HOURS: 6
      BLOCK_COOLDOWN_MAX_HOURS: 72
      FETCH_MAX_ATTEMPTS: 2
      FETCH_RETRY_DELAY_MS: 750
      # Optional organization-approved egress routing. Access-control detection,
      # per-station cooldowns, and the run-level circuit breaker remain enabled.
      SCRAPE_PROXY: ${{ secrets.SCRAPE_PROXY }}
      SCRAPE_PROXY_USERNAME: ${{ secrets.SCRAPE_PROXY_USERNAME }}
      SCRAPE_PROXY_PASSWORD: ${{ secrets.SCRAPE_PROXY_PASSWORD }}
      # Mastodon @caughtakwh bot. Add secret MASTODON_ACCESS_TOKEN (write:statuses)
      # to enable auto-posting of new/changed prices; without it the step is a no-op.
      MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
      MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE || 'https://mastodon.social' }}
      TESLA_HEADLESS: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps chromium

      - name: Enrich stations from supercharge.info
        run: npm run enrich:superchargeinfo

      - name: Run full data refresh pipeline
        run: xvfb-run -a env MAX_STATIONS=$PRICE_SCRAPE_LIMIT npm run update:data

      - name: Announce new and changed prices on Mastodon
        run: npm run social:post

      - name: Commit data updates
        run: |
          set -euo pipefail

          git config user.name "Bryan Carroll"
          git config user.email "carrollbh@gmail.com"

          git status --short

          git add data public/data

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update Supercharger station data"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git fetch origin main

            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Data update pushed successfully."
              exit 0
            fi

            git rebase --abort || true
            sleep 5
          done

          echo "Unable to push after rebasing. A newer conflicting data update may have landed."
          exit 1

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - uses: actions/deploy-pages@v5
