name: Update Supercharger Price Data
on:
  workflow_dispatch:
    inputs:
      discovery_limit:
        description: Max station metadata records to discover
        required: false
        default: '5000'
      max_stations:
        description: Max station pricing pages to scrape this run
        required: false
        default: '250'
  schedule:
    - cron: '17 * * * *'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: caughtakwh-update
  cancel-in-progress: false
jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      DISCOVERY_LIMIT: ${{ github.event.inputs.discovery_limit || '5000' }}
      PRICE_SCRAPE_LIMIT: ${{ github.event.inputs.max_stations || '250' }}
      SCRAPE_DELAY_MS: 1500
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Discover all station metadata
        run: MAX_STATIONS=$DISCOVERY_LIMIT npm run discover
      - name: Scrape current prices for a limited batch
        run: MAX_STATIONS=$PRICE_SCRAPE_LIMIT npm run scrape || true
      - name: Build predictions
        run: npm run predict
      - run: npm run validate:data
      - name: Commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Supercharger price observations
          file_pattern: data/**/*.json
  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
