name: Update Supercharger Price Data
on:
  workflow_dispatch:
    inputs:
      discovery_limit:
        description: Max station metadata records to discover
        required: false
        default: '5000'
      max_stations:
        description: Max station pricing pages to scrape this run
        required: false
        default: '250'
  schedule:
    - cron: '7,37 * * * *'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: caughtakwh-update
  cancel-in-progress: false
jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      DISCOVERY_LIMIT: ${{ github.event.inputs.discovery_limit || '5000' }}
      PRICE_SCRAPE_LIMIT: ${{ github.event.inputs.max_stations || '250' }}
      SCRAPE_DELAY_MS: 1500
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps chromium

      - name: Run full data refresh pipeline
        run: MAX_STATIONS=$PRICE_SCRAPE_LIMIT npm run update:data

      - name: Commit data updates
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add data public/data

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update Supercharger station data"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git fetch origin main

            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Data update pushed successfully."
              exit 0
            fi

            git rebase --abort || true
            sleep 5
          done

          echo "Unable to push after rebasing. A newer conflicting data update may have landed."
          exit 1

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
