name: Dynamic Tesla Pricing Refresh
on:
  workflow_dispatch:
    inputs:
      max_stations:
        description: Max station pricing pages to scrape this run
        required: false
        default: '75'
      scrape_states:
        description: Optional comma-separated states/provinces to refresh, for example CA,NV,ON
        required: false
        default: ''
      scrape_countries:
        description: Optional comma-separated countries to refresh; default data is United States-first
        required: false
        default: ''
      scrape_zip:
        description: Optional US ZIP code for a nearby-first refresh
        required: false
        default: ''
      scrape_lat:
        description: Optional latitude for a nearby-first refresh
        required: false
        default: ''
      scrape_lng:
        description: Optional longitude for a nearby-first refresh
        required: false
        default: ''
      scrape_radius_miles:
        description: Radius for ZIP/lat/lng nearby refresh
        required: false
        default: '150'
      needs_history:
        description: Only refresh stations that need usable price history
        required: false
        default: 'false'
  schedule:
    - cron: '17 8 * * *'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: caughtakwh-data-writer
  cancel-in-progress: false
jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    env:
      PRICE_SCRAPE_LIMIT: ${{ github.event.inputs.max_stations || '75' }}
      SCRAPE_DELAY_MS: 750
      SCRAPE_ROTATE_STATES: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
      SCRAPE_ROTATION_COUNT: 1
      SCRAPE_STATES: ${{ github.event.inputs.scrape_states || '' }}
      SCRAPE_COUNTRIES: ${{ github.event.inputs.scrape_countries || '' }}
      SCRAPE_ZIP: ${{ github.event.inputs.scrape_zip || '' }}
      SCRAPE_LAT: ${{ github.event.inputs.scrape_lat || '' }}
      SCRAPE_LNG: ${{ github.event.inputs.scrape_lng || '' }}
      SCRAPE_RADIUS_MILES: ${{ github.event.inputs.scrape_radius_miles || '150' }}
      SCRAPE_NEEDS_HISTORY: ${{ github.event.inputs.needs_history || (github.event_name == 'schedule' && 'true' || 'false') }}
      TESLA_HEADLESS: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Refresh dynamic Tesla pricing
        run: xvfb-run -a env MAX_STATIONS=$PRICE_SCRAPE_LIMIT npm run scrape || true
      - name: Rebuild predictions and public data
        run: |
          npm run predict
          node scripts/price-change-bot.mjs || true
          npm run sync:public
          npm run validate:data
      - name: Commit pricing updates
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short

          git add data public/data reports || true

          if git diff --cached --quiet; then
            echo "No pricing changes to commit."
            exit 0
          fi

          git commit -m "Refresh dynamic Tesla pricing"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git fetch origin main

            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Pricing update pushed successfully."
              exit 0
            fi

            git rebase --abort || true
            sleep 5
          done

          echo "Unable to push after rebasing. A newer conflicting data update may have landed."
          exit 1
  deploy:
    needs: refresh-prices
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - uses: actions/deploy-pages@v4
