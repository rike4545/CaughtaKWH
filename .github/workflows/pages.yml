name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # Data workflows commit with GITHUB_TOKEN (which doesn't fire a `push` event), so redeploy
  # on a cadence to pick up their commits instead of after every run. Deploying after every
  # 15-minute scrape blew past GitHub Pages' ~10-deploys/hour limit and caused
  # "Deployment failed, try again later"; a 20-minute schedule stays well under the limit.
  # Merges still deploy immediately via `push`.
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Build site
        run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      # GitHub's Pages backend returns "Deployment failed, try again later" when two
      # deploys land close together. Concurrency can't fully prevent it, so retry once.
      - id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retrying a transient Pages failure
        if: steps.deploy.outcome == 'failure'
        run: sleep 45
      - name: Retry Pages deploy
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
