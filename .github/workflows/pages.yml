name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # The data workflows commit with GITHUB_TOKEN, which does not trigger `push`
  # events, so deploy after they finish instead. This is now the single place
  # Pages is deployed from — those workflows no longer deploy themselves, which
  # avoids the "multiple github-pages artifacts" collisions on re-runs.
  workflow_run:
    workflows:
      - Dynamic Tesla Pricing Refresh
      - Pricing Pilot Panel
      - Update Supercharger Price Data
      - Dashboard Improvement Loop
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Serialize Pages deploys but let an in-flight one finish. Cancelling a running
  # deployment (which happens often now that workflow_run fires after every data job)
  # leaves it half-done and surfaces "Deployment failed, try again later".
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Build site
        run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - uses: actions/deploy-pages@v5
