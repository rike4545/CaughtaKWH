name: Pricing Pilot Panel
on:
  workflow_dispatch:
    inputs:
      station_ids:
        description: Optional comma-separated override; blank uses the nearest 10 to Lake Grove
        required: false
        default: ''
      max_stations:
        description: Max pilot stations to scrape
        required: false
        default: '10'
  schedule:
    - cron: '12 */3 * * *'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: caughtakwh-data-writer
  cancel-in-progress: false
jobs:
  refresh-pilot:
    runs-on: ubuntu-latest
    env:
      PILOT_STATION_IDS: ${{ github.event.inputs.station_ids || '' }}
      PRICE_SCRAPE_LIMIT: ${{ github.event.inputs.max_stations || '10' }}
      PILOT_CLUSTER_SIZE: 10
      SCRAPE_DELAY_MS: 500
      AKAMAI_CIRCUIT_BREAKER: 3
      BLOCK_COOLDOWN_BASE_HOURS: 6
      BLOCK_COOLDOWN_MAX_HOURS: 72
      FETCH_MAX_ATTEMPTS: 2
      FETCH_RETRY_DELAY_MS: 750
      # Optional organization-approved egress routing. When the SCRAPE_PROXY secret is
      # unset this is a no-op and the runner IP is used (usually Akamai-blocked); set the
      # secret to route every scrape through a proxy. Cooldowns and the circuit breaker
      # still apply. See docs/scrape-proxy.md.
      SCRAPE_PROXY: ${{ secrets.SCRAPE_PROXY }}
      SCRAPE_PROXY_USERNAME: ${{ secrets.SCRAPE_PROXY_USERNAME }}
      SCRAPE_PROXY_PASSWORD: ${{ secrets.SCRAPE_PROXY_PASSWORD }}
      TESLA_HEADLESS: 'false'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps chromium

      - name: Build Lake Grove pricing cluster
        run: npm run pilot:lake-grove

      - name: Refresh pilot pricing panel
        run: |
          station_ids="$PILOT_STATION_IDS"
          if [ -z "$station_ids" ]; then
            station_ids="$(jq -r '.stationIds | join(",")' data/pilot-lake-grove.json)"
          fi
          echo "Refreshing Lake Grove cluster: $station_ids"
          xvfb-run -a env SCRAPE_STATION_IDS="$station_ids" MAX_STATIONS="$PRICE_SCRAPE_LIMIT" npm run scrape

      - name: Rebuild predictions and public data
        run: |
          npm run predict
          node scripts/price-change-bot.mjs || true
          npm run sync:public
          npm run validate:data

      - name: Commit pilot pricing updates
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git status --short
          git add data public/data reports || true

          if git diff --cached --quiet; then
            echo "No pilot pricing changes to commit."
            exit 0
          fi

          git commit -m "Refresh pilot Supercharger pricing"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git fetch origin main

            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Pilot pricing update pushed successfully."
              exit 0
            fi

            git rebase --abort || true
            sleep 5
          done

          echo "Unable to push after rebasing. A newer conflicting data update may have landed."
          exit 1
