name: Bot Audits
on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node scripts/maintainer-report.mjs
      - run: node scripts/location-quality-bot.mjs
      - run: node scripts/dashboard-bot.mjs
      - run: node scripts/price-change-bot.mjs
      - name: Commit reports
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Bot audit reports'
          file_pattern: 'reports/**/*.md data/price-changes.json'
