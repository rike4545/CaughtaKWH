name: Agents - Improve & QA

on:
  schedule:
    - cron: "0 9 * * 1"
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: main-writer
  cancel-in-progress: false

jobs:
  qa-and-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Data health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dataDoctor.mjs
      - name: Community report QA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/communityQA.mjs
      - name: Community credits + needs list
        run: npm run community:rollup
      - name: Prediction QA / backtest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/predictionQA.mjs
      - name: Commit reports (rebase-safe)
        run: |
          git config user.name "caughtakwh-agent[bot]"
          git config user.email "agent@users.noreply.github.com"
          git add reports data CONTRIBUTORS.md public/data || true
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "chore(agent): refresh QA + health reports"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push race, retry $i"; sleep 5
          done
          echo "Could not push after retries"; exit 1

  drift-and-backlog:
    if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Structure drift detection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESLA_HEADLESS: "false"
        run: xvfb-run -a node scripts/detectDrift.mjs
      - name: Improvement backlog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/improveAgent.mjs
      - name: Commit fingerprints + backlog (rebase-safe)
        run: |
          git config user.name "caughtakwh-agent[bot]"
          git config user.email "agent@users.noreply.github.com"
          git add data reports || true
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "chore(agent): drift fingerprint + improvement backlog"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push race, retry $i"; sleep 5
          done
          echo "Could not push after retries"; exit 1
