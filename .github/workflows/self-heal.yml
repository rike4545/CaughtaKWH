name: Self-Heal Pipeline

on:
  workflow_run:
    workflows: ["Update Supercharger Price Data"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_stations:
        description: "Max stations to recover"
        default: "25"

permissions:
  contents: write
  issues: write

concurrency:
  group: main-writer
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run self-heal (headed via Xvfb)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESLA_HEADLESS: "false"
          MAX_STATIONS: ${{ github.event.inputs.max_stations || '25' }}
        run: xvfb-run -a node scripts/selfHeal.mjs
      - name: Repair data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dataDoctor.mjs
      - name: Commit recovered data (rebase-safe)
        run: |
          git config user.name "caughtakwh-agent[bot]"
          git config user.email "agent@users.noreply.github.com"
          git add data public/data reports || true
          if git diff --cached --quiet; then echo "No changes"; exit 0; fi
          git commit -m "chore(agent): self-heal + data repair"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push race, retry $i"; sleep 5
          done
          echo "Could not push after retries"; exit 1
