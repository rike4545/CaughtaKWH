name: Self-Heal Pipeline

# Runs after data refreshes to keep the pipeline healthy: retries recoverable
# failures, repairs data, restores last-known-good on regression, and escalates
# only when a human is genuinely needed. Does not attempt to bypass access
# controls — a hard block is escalated, not worked around.

on:
  workflow_run:
    workflows: ["Update Supercharger Price Data"]
    types: [completed]
  workflow_dispatch:
    inputs:
      max_stations:
        description: "Max stations to recover"
        default: "25"

permissions:
  contents: write
  issues: write

concurrency:
  group: self-heal
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run self-heal (headed via Xvfb)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TESLA_HEADLESS: "false"
          MAX_STATIONS: ${{ github.event.inputs.max_stations || '25' }}
        run: xvfb-run -a node scripts/selfHeal.mjs

      - name: Repair data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dataDoctor.mjs

      - name: Commit recovered data
        run: |
          git config user.name "caughtakwh-agent[bot]"
          git config user.email "agent@users.noreply.github.com"
          git add data public/data reports || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(agent): self-heal + data repair"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
